<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contractor Cold-Call Tracker — San Jose</title>
<style>
:root{
 --bg:#e6e8ee;--card:#ffffff;--elev:#ffffff;--elev2:#f0f1f4;
 --sep:#e3e5ea;--sep2:#d6d9e0;
 --txt:#1d1d1f;--txt2:#6e6e73;--txt3:#a1a1a8;
 --blue:#0071e3;--green:#1a8f3c;--amber:#b8860b;--red:#d23b35;
 color-scheme:light;
}
*{box-sizing:border-box}
html{background:#e9f0ff}
body{background:linear-gradient(165deg,#e9f0ff 0%,#f3edfc 55%,#fdeef4 100%);background-attachment:fixed;min-height:100vh}
body{margin:0;font-family:"Avenir Next","Avenir",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--txt);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
header{background:linear-gradient(180deg,#ffffff 0%,#f7f7f9 100%);padding:22px 22px;border-bottom:1px solid var(--sep)}
header h1{margin:0;font-family:"Futura","Futura Bold",-apple-system,sans-serif;font-size:34px;font-weight:700;text-transform:uppercase;letter-spacing:.02em}
header p{margin:5px 0 0;font-size:13px;color:var(--txt2);line-height:1.45}
.bar{background:linear-gradient(180deg,#eaf0ff,#edeefb);border-bottom:1px solid #d8def0;padding:12px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
#q{flex:1;min-width:200px;padding:10px 14px;font-size:15px;color:var(--txt);background:#fff;border:1px solid var(--sep2);border-radius:10px}
#q::placeholder{color:var(--txt3)}
#q:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.18)}
select.filt{padding:10px 12px;font-size:14px;color:var(--txt);border:1px solid var(--sep2);border-radius:10px;background:#fff}
select.filt:focus{outline:none;border-color:var(--blue)}
.count{font-size:13px;color:var(--txt2);white-space:nowrap}
.bar:first-of-type{padding-top:26px}
.btn{padding:10px 15px;font-size:14px;font-weight:600;border:1px solid var(--sep2);background:#fff;border-radius:10px;cursor:pointer;color:var(--blue);transition:background .15s}
.btn:hover{background:var(--elev2)}
.btn:active{background:#e6e7eb}
.saved{font-size:12px;color:var(--green);white-space:nowrap;min-width:96px}
.footbar{border-bottom:none;border-top:1px solid var(--sep);justify-content:flex-start;align-items:center;padding-bottom:46px}
.pagerbar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;padding:14px 16px;background:#eef1fb;border-bottom:1px solid #d8def0}
.pagerbar.bottom{border-bottom:none;border-top:1px solid var(--sep)}
.pg{padding:8px 13px;font-size:14px;border:1px solid var(--sep2);background:#fff;border-radius:9px;cursor:pointer;color:var(--blue);font-weight:600;transition:background .15s}
.pg:disabled{opacity:.4;cursor:default}
.pg:not(:disabled):hover{background:var(--elev2)}
.pginfo{font-size:14px;color:var(--txt2);font-weight:600;min-width:130px;text-align:center}
.jump{width:60px;padding:7px 8px;font-size:14px;color:var(--txt);background:#fff;border:1px solid var(--sep2);border-radius:8px;text-align:center}
.jump:focus{outline:none;border-color:var(--blue)}
.wrap{padding:16px 14px 30px;max-width:1100px;margin:0 auto}
table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border:1px solid #d3d7e0;border-radius:14px;overflow:hidden;box-shadow:0 6px 22px rgba(28,38,64,.10)}
th,td{text-align:left;padding:13px 14px;border-bottom:1px solid var(--sep);font-size:14px;vertical-align:top}
tr:last-child td{border-bottom:none}
th{background:#e6ecfb;font-weight:600;color:#4b4f78;font-size:12px;letter-spacing:.03em;text-transform:uppercase;cursor:pointer;white-space:nowrap;user-select:none;vertical-align:middle}
th.sortable:hover{background:#dbe3f8;color:#33375e}
td.mid{vertical-align:middle}
tbody tr:nth-child(even) td{background:#f7f5ff}
tr.done td{background:rgba(120,200,140,.20)}
tr:hover td{background:#eaf1ff}
tr.done:hover td{background:rgba(120,200,140,.30)}
.chk{width:20px;height:20px;cursor:pointer;accent-color:var(--green)}
.nm{color:var(--blue);text-decoration:none;font-weight:600;font-size:15px;letter-spacing:-.01em}
.nm:hover{text-decoration:underline}
.sub{display:block;font-size:12px;color:var(--txt2);font-weight:400;margin-top:3px}
a.sub.addr{text-decoration:none;cursor:pointer}
a.sub.addr:hover{color:var(--blue);text-decoration:underline}
.lks{display:block;margin-top:5px;font-size:12px}
.lks a{color:var(--blue);text-decoration:none;font-weight:600;cursor:pointer}
.lks a:hover{text-decoration:underline}
.lks .sep{color:var(--txt3);margin:0 7px}
.call{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;text-decoration:none;padding:7px 12px;border-radius:9px;font-weight:700;font-size:14px;white-space:nowrap}
.call:hover{filter:brightness(1.06)}
.call:active{filter:brightness(.92)}
.nolink{color:var(--txt3);font-size:13px}
.copylic{color:var(--blue);text-decoration:none;font-weight:600;cursor:pointer;white-space:nowrap;font-variant-numeric:tabular-nums}
.copylic:hover{text-decoration:underline}
.notescell{vertical-align:middle}
.namecell{vertical-align:top}
select.interest{padding:8px 9px;font-size:13px;color:var(--txt);border:1px solid var(--sep2);border-radius:9px;background:#fff;min-width:140px}
select.interest:focus{outline:none;border-color:var(--blue)}
select.interest.i-yes{background:rgba(26,143,60,.12);border-color:rgba(26,143,60,.45);color:#157a32}
select.interest.i-maybe{background:rgba(184,134,11,.13);border-color:rgba(184,134,11,.45);color:#946a09}
select.interest.i-no{background:rgba(210,59,53,.11);border-color:rgba(210,59,53,.4);color:#b3322d}
select.interest.i-vm,select.interest.i-na{background:var(--elev2);color:var(--txt2)}
.notewrap{position:relative}
textarea.notes{width:100%;min-width:160px;padding:8px 10px;font-size:13px;color:var(--txt);background:#fff;border:1px solid var(--sep2);border-radius:9px;resize:vertical;font-family:inherit;line-height:1.4;overflow:hidden;min-height:38px;transition:border-color .15s,box-shadow .15s}
textarea.notes::placeholder{color:var(--txt3)}
textarea.notes:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.16)}
textarea.notes.justsaved{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,143,60,.18)}
.savedtick{position:absolute;right:9px;bottom:8px;font-size:11px;color:var(--green);opacity:0;transition:opacity .15s;pointer-events:none}
.savedtick.show{opacity:1}
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:11px 20px;border-radius:11px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s;z-index:20;box-shadow:0 8px 30px rgba(0,0,0,.25)}
#toast.show{opacity:1}
.progress{font-size:13px;color:var(--txt2);font-weight:600}
@media(max-width:640px){
 .wrap{padding:12px 10px 44px}
 thead{display:none}
 table{display:block;border:none;background:transparent;box-shadow:none;border-radius:0}
 tbody{display:block}
 tr{display:block;background:var(--card);border:1px solid #d3d7e0;border-radius:13px;margin-bottom:12px;padding:11px 14px;box-shadow:0 2px 12px rgba(28,38,64,.09)}
 tr.done{background:rgba(120,200,140,.16)}
 tr:nth-child(even) td{background:transparent}
 td{display:flex;align-items:center;gap:10px;border:none!important;padding:6px 0;background:transparent!important}
 td[data-label]::before{content:attr(data-label);flex:0 0 78px;font-size:11px;color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
 td.namecell{display:block;padding:2px 0 9px;border-bottom:1px solid var(--sep)!important;margin-bottom:4px}
 td.notescell{display:block}
 td.notescell::before{display:block;margin:0 0 5px}
 textarea.notes{width:100%}
 .nm{font-size:17px}
 .sub{font-size:12.5px}
}
</style></head><body>

<div class="bar">
  <input id="q" placeholder="Search name or phone…" autocomplete="off">
  <select class="filt" id="fStatus"><option value="">All</option><option value="todo">Not contacted</option><option value="done">Contacted</option></select>
  <select class="filt" id="fInt"><option value="">Any interest</option><option>Interested</option><option>Maybe</option><option>Not interested</option><option>Left voicemail</option><option>No answer</option><option value="__none">Unset</option></select>

</div>
<div class="wrap"><table id="t"><thead><tr>

<th class="sortable" data-k="tel">Phone</th>

</tr></thead><tbody id="b"></tbody></table></div>
<div class="pagerbar bottom" id="pagerBot"></div>
<div class="bar footbar">

  <input type="file" id="importFile" accept=".csv" style="display:none">
  <button class="btn" id="syncBtn">☁︎ Connect sync</button>
  <span class="saved" id="syncMsg"></span>
  <span class="saved" id="savedMsg"></span>
</div>
<div id="toast"></div>

const PAGE_SIZE=50;
let state=JSON.parse(localStorage.getItem(LSKEY)||"{}");
const INT_OPTS=["","Interested","Maybe","Not interested","Left voicemail","No answer"];
const b=document.getElementById('b'),q=document.getElementById('q'),count=document.getElementById('count'),
 toast=document.getElementById('toast'),prog=document.getElementById('prog'),savedMsg=document.getElementById('savedMsg'),
 fStatus=document.getElementById('fStatus'),fInt=document.getElementById('fInt'),
 pagerTop=document.getElementById('pagerTop'),pagerBot=document.getElementById('pagerBot');
let view=DATA.slice(),sortK=null,asc=true,tt=null,page=1;
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function st(id){return state[id]||(state[id]={done:false,interest:"",notes:""})}
function nowStr(){const d=new Date();return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
function save(){localStorage.setItem(LSKEY,JSON.stringify(state));savedMsg.textContent='✓ Saved '+nowStr();}
function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),1700)}
function copyTxt(p){return navigator.clipboard?navigator.clipboard.writeText(p).catch(()=>fallbackCopy(p)):fallbackCopy(p)}
function fallbackCopy(p){return new Promise(res=>{const t=document.createElement('textarea');t.value=p;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();res()})}
function intClass(v){return v==='Interested'?'i-yes':v==='Maybe'?'i-maybe':v==='Not interested'?'i-no':v==='Left voicemail'?'i-vm':v==='No answer'?'i-na':''}
function gSearch(r){return 'https://www.google.com/search?q='+encodeURIComponent('"'+r.name+'" '+(r.city||'San Jose')+' CA contractor')}
function mapsUrl(r){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent([r.name,r.addr,r.city,'CA',r.zip].filter(Boolean).join(' '))}
function totalPages(){return Math.max(1,Math.ceil(view.length/PAGE_SIZE))}
function updateProgress(){const done=DATA.filter(r=>st(r.id).done).length;prog.textContent=`${done} contacted / ${DATA.length}`}
function autosize(ta){ta.style.height='auto';ta.style.height=(ta.scrollHeight)+'px'}
function pagerHTML(){
 const tp=totalPages();
 return `<button class="pg" data-p="first" ${page<=1?'disabled':''}>« First</button>
 <button class="pg" data-p="prev" ${page<=1?'disabled':''}>‹ Prev</button>
 <span class="pginfo">Page <input class="jump" id="jumpInput" value="${page}"> / ${tp}</span>
 <button class="pg" data-p="next" ${page>=tp?'disabled':''}>Next ›</button>
 <button class="pg" data-p="last" ${page>=tp?'disabled':''}>Last »</button>`;
}
function bindPager(el){
 el.querySelectorAll('.pg').forEach(btn=>btn.addEventListener('click',()=>{
  const tp=totalPages(),d=btn.dataset.p;
  if(d==='first')page=1;else if(d==='prev')page=Math.max(1,page-1);
  else if(d==='next')page=Math.min(tp,page+1);else if(d==='last')page=tp;

 }));
 const ji=el.querySelector('#jumpInput');

}
function render(){
 const tp=totalPages(); if(page>tp)page=tp; if(page<1)page=1;
 const start=(page-1)*PAGE_SIZE, pageRows=view.slice(start,start+PAGE_SIZE);
 b.innerHTML=pageRows.map(r=>{

  const licCell=r.lic?`<a class="copylic" data-lic="${esc(r.lic)}" title="Copy license #${esc(r.lic)}">#${esc(r.lic)}</a>`:'<span class="nolink">—</span>';
  const nameCell=`<a class="nm" target="_blank" href="${gSearch(r)}" title="Web-search ${esc(r.name)}">${esc(r.name)}</a>`+(detail?`<a class="sub addr" target="_blank" href="${mapsUrl(r)}" title="Open in Maps">📍 ${esc(detail)}</a>`:'');
  const phone=r.tel?`<a class="call" href="tel:${r.tel}">☎ ${esc(r.phone)}</a>`:'<span class="nolink">no phone</span>';
  const opts=INT_OPTS.map(o=>`<option ${o===s.interest?'selected':''} ${o===''?'value=""':''}>${o||'—'}</option>`).join('');
  return `<tr class="${s.done?'done':''}" data-id="${esc(r.id)}">
   <td class="mid" data-label="Called"><input type="checkbox" class="chk" ${s.done?'checked':''} data-act="done"></td>
   <td class="namecell">${nameCell}</td>
   <td class="mid" data-label="Phone">${phone}</td>
   <td class="mid" data-label="License">${licCell}</td>
   <td class="mid" data-label="Interest"><select class="interest ${intClass(s.interest)}" data-act="interest">${opts}</select></td>
   <td class="notescell" data-label="Notes"><div class="notewrap"><textarea class="notes" data-act="notes" rows="1" placeholder="Notes…">${esc(s.notes)}</textarea><span class="savedtick">saved ✓</span></div></td>
  </tr>`;
 }).join('');
 b.querySelectorAll('textarea.notes').forEach(autosize);
 const showingFrom=view.length?start+1:0, showingTo=Math.min(start+PAGE_SIZE,view.length);
 count.textContent=`${showingFrom}–${showingTo} of ${view.length}`;
 pagerBot.innerHTML=pagerHTML();
 bindPager(pagerBot);
 updateProgress();
}
b.addEventListener('click',e=>{
 const cl=e.target.closest('a.copylic');
 if(cl){e.preventDefault();copyTxt(cl.dataset.lic).then(()=>showToast('Copied license #'+cl.dataset.lic));return;}
 const chk=e.target.closest('input[data-act="done"]');
 if(chk){const id=chk.closest('tr').dataset.id;st(id).done=chk.checked;chk.closest('tr').classList.toggle('done',chk.checked);save();touch(id);updateProgress();}
});
b.addEventListener('change',e=>{
 const sel=e.target.closest('select[data-act="interest"]');
 if(sel){const id=sel.closest('tr').dataset.id;st(id).interest=sel.value;sel.className='interest '+intClass(sel.value);save();touch(id);}
});
let noteTimers={};
b.addEventListener('input',e=>{
 const nt=e.target.closest('textarea[data-act="notes"]');
 if(nt){
  autosize(nt);
  const tr=nt.closest('tr'),id=tr.dataset.id;
  st(id).notes=nt.value;
  clearTimeout(noteTimers[id]);
  noteTimers[id]=setTimeout(()=>{
   save();touch(id);
   const tick=tr.querySelector('.savedtick');
   nt.classList.add('justsaved');if(tick)tick.classList.add('show');
   setTimeout(()=>{nt.classList.remove('justsaved');if(tick)tick.classList.remove('show');},1100);
  },400);
 }
});
function filter(){
 const s=q.value.trim().toLowerCase(),fs=fStatus.value,fi=fInt.value;
 view=DATA.filter(r=>{
  if(s && !(r.name+' '+r.phone).toLowerCase().includes(s))return false;
  const stt=st(r.id);
  if(fs==='done'&&!stt.done)return false;
  if(fs==='todo'&&stt.done)return false;
  if(fi==='__none'&&stt.interest!=='')return false;
  if(fi&&fi!=='__none'&&stt.interest!==fi)return false;
  return true;
 });
 page=1;
 if(sortK)applySort();else render();
}
function applySort(){
 view.sort((a,b)=>{
  let x,y;
  if(sortK==='done'){x=st(a.id).done?1:0;y=st(b.id).done?1:0;}
  else if(sortK==='interest'){x=st(a.id).interest;y=st(b.id).interest;}
  else if(sortK==='lic'){x=parseInt(a.lic,10)||0;y=parseInt(b.lic,10)||0;}
  else{x=(a[sortK]||'').toString().toLowerCase();y=(b[sortK]||'').toString().toLowerCase();}
  return x<y?-1:x>y?1:0;
 });
 if(!asc)view.reverse();render();
}
document.querySelectorAll('th.sortable').forEach(th=>th.addEventListener('click',()=>{const k=th.dataset.k;asc=sortK===k?!asc:true;sortK=k;page=1;applySort();}));
q.addEventListener('input',filter);fStatus.addEventListener('change',filter);fInt.addEventListener('change',filter);
document.getElementById('export').addEventListener('click',()=>{
 const rowsv=[['Business Name','Phone','License #','Address','City','Zip','Contacted','Interest','Notes']];
 DATA.forEach(r=>{const s=st(r.id);rowsv.push([r.name,r.phone,r.lic,r.addr,r.city,r.zip,s.done?'YES':'',s.interest,s.notes]);});
 const csv=rowsv.map(row=>row.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')).join('\n');
 const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);a.download='contractor_call_progress.csv';a.click();showToast('Progress exported');
});
// ---- Import (restore/merge saved progress) ----
function parseCSV(text){
 const rows=[];let i=0,field='',row=[],inq=false;
 while(i<text.length){const c=text[i];
  if(inq){if(c==='"'){if(text[i+1]==='"'){field+='"';i+=2;continue;}inq=false;i++;continue;}field+=c;i++;continue;}
  if(c==='"'){inq=true;i++;continue;}
  if(c===','){row.push(field);field='';i++;continue;}
  if(c==='\r'){i++;continue;}
  if(c==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
  field+=c;i++;
 }
 if(field.length||row.length){row.push(field);rows.push(row);}
 return rows;
}
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',ev=>{
 const file=ev.target.files[0];if(!file)return;
 const reader=new FileReader();
 reader.onload=()=>{
  try{
   const rows=parseCSV(reader.result).filter(r=>r.length>1);
   if(!rows.length){showToast('Nothing to import');return;}
   const head=rows[0].map(h=>h.trim().toLowerCase());
   const iLic=head.indexOf('license #'),iDone=head.indexOf('contacted'),iInt=head.indexOf('interest'),iNotes=head.indexOf('notes');
   const iName=head.indexOf('business name'),iPhone=head.indexOf('phone');
   const byName={};DATA.forEach(r=>{byName[(r.name+'|'+r.phone).toLowerCase()]=r.id});
   let n=0;
   for(let k=1;k<rows.length;k++){const row=rows[k];
    let id=iLic>=0?(row[iLic]||'').trim():'';
    if(!id||!state.hasOwnProperty(id)){ // fallback match by name+phone
     const key=((iName>=0?row[iName]:'')+'|'+(iPhone>=0?row[iPhone]:'')).toLowerCase().trim();
     if(byName[key])id=byName[key];
    }
    if(!id)continue;
    const s=st(id);
    if(iDone>=0)s.done=(row[iDone]||'').trim().toUpperCase()==='YES';
    if(iInt>=0)s.interest=(row[iInt]||'').trim();
    if(iNotes>=0)s.notes=(row[iNotes]||'');
    n++;
   }
   save();filter();showToast('Imported progress for '+n+' rows');
  }catch(err){showToast('Import failed — check the file');}
  ev.target.value='';
 };
 reader.readAsText(file);
});
savedMsg.textContent=Object.keys(state).length?'✓ Progress loaded':'';

// ---- Shared sync via Google Apps Script backend ----
var SYNC_KEY="cslb_syncurl";
var syncUrl=localStorage.getItem(SYNC_KEY)||"";
var syncTimer=null, editingNote=false;
function syncStatus(t){var m=document.getElementById('syncMsg');if(m)m.textContent=t;}
function touch(id){st(id).updated=Date.now();localStorage.setItem(LSKEY,JSON.stringify(state));pushRec(id);}
function recOf(id){var r=DATA.find(function(x){return x.id===id;})||{};var s=st(id);return {id:id,name:r.name||'',phone:r.phone||'',done:!!s.done,interest:s.interest||'',notes:s.notes||'',updated:s.updated||Date.now()};}
function pushRec(id){
 if(!syncUrl)return;
 fetch(syncUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({type:'upsert',rec:recOf(id)})})
  .then(function(){syncStatus('☁︎ Synced '+nowStr());}).catch(function(){syncStatus('⚠︎ Sync offline');});
}
function pullAll(){
 if(!syncUrl)return;
 fetch(syncUrl).then(function(r){return r.json();}).then(function(list){
  if(!Array.isArray(list))return;
  var changed=false;
  var focusId=null;
  if(editingNote&&document.activeElement&&document.activeElement.closest){var tr=document.activeElement.closest('tr');if(tr)focusId=tr.dataset.id;}
  list.forEach(function(rem){
   if(!rem||!rem.id)return;
   if(rem.id===focusId)return;
   var loc=state[rem.id];
   var ru=+rem.updated||0, lu=loc?(+loc.updated||0):0;
   if(!loc||ru>lu){
    state[rem.id]={done:rem.done===true||rem.done==='true'||String(rem.done).toUpperCase()==='TRUE'||String(rem.done).toUpperCase()==='YES',interest:rem.interest||'',notes:rem.notes||'',updated:ru};
    changed=true;
   }
  });
  if(changed){localStorage.setItem(LSKEY,JSON.stringify(state));if(!editingNote)render();}
  syncStatus('☁︎ Synced '+nowStr());
 }).catch(function(){syncStatus('⚠︎ Sync offline');});
}
function startSync(){if(syncTimer)clearInterval(syncTimer);if(!syncUrl)return;pullAll();syncTimer=setInterval(pullAll,20000);}
function connectSync(){
 var url=prompt('Paste your sync web-app URL (the Google Apps Script /exec link). You and your partner must enter the SAME url.', syncUrl||'');
 if(url===null)return;
 url=url.trim();syncUrl=url;localStorage.setItem(SYNC_KEY,url);
 if(!url){syncStatus('Sync off');return;}
 var ids=Object.keys(state).filter(function(id){var s=state[id];return s.done||s.interest||(s.notes&&s.notes.length);});
 ids.forEach(function(id){if(!state[id].updated)state[id].updated=Date.now();});
 localStorage.setItem(LSKEY,JSON.stringify(state));
 ids.forEach(pushRec);
 syncStatus('☁︎ Connecting…');startSync();
}
document.addEventListener('focusin',function(e){if(e.target.closest&&e.target.closest('textarea[data-act="notes"]'))editingNote=true;});
document.addEventListener('focusout',function(e){if(e.target.closest&&e.target.closest('textarea[data-act="notes"]'))setTimeout(function(){editingNote=false;},300);});
(function(){var sb=document.getElementById('syncBtn');if(sb)sb.addEventListener('click',connectSync);if(syncUrl){syncStatus('☁︎ Sync on');startSync();}})();

render();
</script></body></html>
